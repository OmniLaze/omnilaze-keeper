name: BleepClone
options:
  bundleIdPrefix: com.omnilaze
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
packages: {}
targets:
  BleepClone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BleepClone/App
      - path: BleepClone/Models
      - path: BleepClone/Services
      - path: BleepClone/Stores
      - path: BleepClone/UI
        excludes:
          - "**/*.md"
    info:
      path: BleepClone/Info.plist
      properties:
        CFBundleName: BleepClone
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omnilaze.BleepClone
        PRODUCT_NAME: BleepClone
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    scheme:
      testTargets: []

